<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Đếm Số Chiến Lược</title>
    <style>
        /* CSS trang trí giao diện */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
        }
        .rule {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }
        input[type="number"] {
            width: 80px;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #3498db;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            margin: 5px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .btn-action {
            background-color: #2ecc71;
            width: 80px;
            height: 50px;
            font-size: 20px;
        }
        .btn-action:hover {
            background-color: #27ae60;
        }
        .btn-action:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .status-box {
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .number-display {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }
        .player-turn {
            font-size: 20px;
            font-weight: bold;
            color: #8e44ad;
        }
        .player-2-turn {
            color: #d35400; /* Đổi màu cho người chơi 2 */
        }
        /* Ẩn các khu vực chưa cần thiết */
        #gameplay-area, #result-area {
            display: none;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🎯 Đếm Số Chiến Lược</h1>
        <div class="rule">Mỗi lượt chọn đếm thêm 1, 2 hoặc 3 số.<br>Ai đếm tới đích trước sẽ <b>CHIẾN THẮNG</b>!</div>

        <div id="setup-area">
            <h3>Nhập số mục tiêu:</h3>
            <input type="number" id="targetInput" value="30" min="5">
            <br><br>
            <button onclick="startGame()">Bắt Đầu Chơi</button>
        </div>

        <div id="gameplay-area">
            <div class="status-box">
                <div>Mục tiêu cần đạt: <b id="targetDisplay">30</b></div>
                <div class="number-display" id="currentNumberDisplay">0</div>
                <div>Khoảng cách đến đích: <b id="remainingDisplay">30</b></div>
            </div>

            <div class="player-turn" id="playerTurnDisplay">Đến lượt: Người chơi 1</div>
            <br>
            
            <p>Chọn số lượng muốn đếm thêm:</p>
            <div>
                <button class="btn-action" id="btn1" onclick="countNumber(1)">+1</button>
                <button class="btn-action" id="btn2" onclick="countNumber(2)">+2</button>
                <button class="btn-action" id="btn3" onclick="countNumber(3)">+3</button>
            </div>
        </div>

        <div id="result-area">
            <h2 id="winnerText" style="color: #e74c3c;">🎉 Người chơi X chiến thắng! 🎉</h2>
            <button onclick="resetGame()">Chơi Lại Ván Khác</button>
        </div>
    </div>

    <script>
        // Các biến lưu trữ trạng thái trò chơi
        let targetNumber = 30;
        let currentNumber = 0;
        let currentPlayer = 1;

        // Hàm bắt đầu game
        function startGame() {
            let inputVal = parseInt(document.getElementById("targetInput").value);
            
            if (isNaN(inputVal) || inputVal < 5) {
                alert("Vui lòng nhập số mục tiêu hợp lệ (lớn hơn hoặc bằng 5)!");
                return;
            }

            targetNumber = inputVal;
            currentNumber = 0;
            currentPlayer = 1;

            // Cập nhật giao diện
            document.getElementById("targetDisplay").innerText = targetNumber;
            updateUI();

            // Chuyển đổi màn hình
            document.getElementById("setup-area").style.display = "none";
            document.getElementById("gameplay-area").style.display = "block";
            document.getElementById("result-area").style.display = "none";
        }

        // Hàm xử lý khi người chơi bấm nút +1, +2, +3
        function countNumber(step) {
            // Ngăn chặn việc đếm lố số mục tiêu
            if (currentNumber + step > targetNumber) {
                alert("Cảnh báo: Không được đếm vượt quá số mục tiêu!");
                return;
            }

            // Cộng số
            currentNumber += step;
            
            // Kiểm tra chiến thắng
            if (currentNumber === targetNumber) {
                updateUI();
                endGame();
            } else {
                // Đổi lượt người chơi
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                updateUI();
            }
        }

        // Hàm cập nhật các con số và nút bấm trên màn hình
        function updateUI() {
            // Cập nhật số
            document.getElementById("currentNumberDisplay").innerText = currentNumber;
            document.getElementById("remainingDisplay").innerText = targetNumber - currentNumber;

            // Cập nhật lượt chơi và đổi màu cho dễ nhìn
            let turnText = document.getElementById("playerTurnDisplay");
            turnText.innerText = `▶ Lượt của: NGƯỜI CHƠI ${currentPlayer} ◀`;
            if (currentPlayer === 2) {
                turnText.classList.add("player-2-turn");
            } else {
                turnText.classList.remove("player-2-turn");
            }

            // Vô hiệu hóa nút nếu cộng vào sẽ vượt quá mục tiêu
            let remaining = targetNumber - currentNumber;
            document.getElementById("btn1").disabled = remaining < 1;
            document.getElementById("btn2").disabled = remaining < 2;
            document.getElementById("btn3").disabled = remaining < 3;
        }

        // Hàm kết thúc game
        function endGame() {
            document.getElementById("gameplay-area").style.display = "none";
            document.getElementById("result-area").style.display = "block";
            document.getElementById("winnerText").innerText = `🎉 NGƯỜI CHƠI ${currentPlayer} CHIẾN THẮNG! 🎉`;
        }

        // Hàm reset về màn hình thiết lập
        function resetGame() {
            document.getElementById("setup-area").style.display = "block";
            document.getElementById("result-area").style.display = "none";
        }
    </script>

</body>
</html>
